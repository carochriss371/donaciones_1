name: Actualizar Datos desde Apps Script

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Procesar y Guardar Datos
        env:
          PAYLOAD_DATA: ${{ github.event.client_payload.data }}
          SECRET: ${{ github.event.client_payload.secret }}
        run: |
          # 1. Validar Secret
          EXPECTED_SECRET="${{ secrets.WEBHOOK_SECRET }}"
          if [ -n "$EXPECTED_SECRET" ] && [ "$EXPECTED_SECRET" != "$SECRET" ]; then
            echo "❌ Secret inválido o no coincide"
            exit 1
          fi
          echo "✅ Secret verificado correctamente"

          # 2. Crear directorio de destino
          mkdir -p public/data

          # 3. Guardar el payload en un archivo temporal de forma segura (Heredoc)
          cat << 'EOF' > /tmp/payload.json
          $PAYLOAD_DATA
          EOF

          # 4. Verificar si el archivo tiene datos
          if [ ! -s /tmp/payload.json ] || [ "$PAYLOAD_DATA" = "null" ]; then
            echo "❌ No se recibieron datos o el payload está vacío"
            exit 1
          fi

          # 5. Extraer los JSON individuales usando jq
          jq -r '.contabilidades // []' /tmp/payload.json > public/data/contabilidad.json
          jq -r '.inventario // []' /tmp/payload.json > public/data/inventario.json
          jq -r '.entradas // []' /tmp/payload.json > public/data/entradas.json
          jq -r '.donado // []' /tmp/payload.json > public/data/donado.json
          jq -r '{summary: .summary, timestamp: .timestamp}' /tmp/payload.json > public/data/metadata.json

          echo "✅ Archivos JSON generados con éxito en public/data/"
          ls -la public/data/

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/
          git diff --staged --quiet || git commit -m "Actualizar datos desde Apps Script $(date +'%Y-%m-%d %H:%M:%S')"
          git push