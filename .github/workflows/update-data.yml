name: Actualizar Datos desde Apps Script

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Debug - Verificar payload
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Event type: ${{ github.event.action }}"
          echo "Client payload: ${{ toJSON(github.event.client_payload) }}"
      
      - name: Extract and save data
        env:
          DATA: ${{ toJSON(github.event.client_payload.data) }}
          SECRET: ${{ github.event.client_payload.secret }}
          TIMESTAMP: ${{ github.event.client_payload.timestamp }}
        run: |
          # Verificar si DATA está vacío
          if [ -z "$DATA" ] || [ "$DATA" = "null" ] || [ "$DATA" = '""' ]; then
            echo "❌ No se recibieron datos"
            echo "DATA: $DATA"
            exit 1
          fi
          
          # Verificar secret
          EXPECTED_SECRET="${{ secrets.WEBHOOK_SECRET }}"
          if [ -n "$SECRET" ] && [ "$EXPECTED_SECRET" != "$SECRET" ]; then
            echo "❌ Secret inválido"
            exit 1
          fi
          echo "✅ Secret verificado"
          
          # Decodificar y guardar datos
          mkdir -p public/data
          
          # Usar echo y sed para quitar comillas extras
          echo "$DATA" | sed 's/^"//' | sed 's/"$//' | jq '.contabilidades' > public/data/contabilidad.json
          echo "$DATA" | sed 's/^"//' | sed 's/"$//' | jq '.inventario' > public/data/inventario.json
          echo "$DATA" | sed 's/^"//' | sed 's/"$//' | jq '.entradas' > public/data/entradas.json
          echo "$DATA" | sed 's/^"//' | sed 's/"$//' | jq '.donado' > public/data/donado.json
          echo "$DATA" | sed 's/^"//' | sed 's/"$//' | jq '{summary: .summary, timestamp: .timestamp}' > public/data/metadata.json
          
          echo "✅ Datos guardados correctamente"
          ls -la public/data/
          
          # Mostrar primeras líneas de cada archivo
          echo "📄 contabilidad.json:"
          head -c 200 public/data/contabilidad.json
          echo ""
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/
          git diff --staged --quiet || git commit -m "Actualizar datos desde Apps Script $(date +'%Y-%m-%d %H:%M:%S')"
          git push