name: Actualizar Datos desde Apps Script

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Debug - Verificar payload
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Event type: ${{ github.event.action }}"
          echo "Client payload: ${{ toJson(github.event.client_payload) }}"
      
      - name: Extract and save data
        run: |
          # 🔥 IMPORTANTE: Acceder a los datos correctamente
          DATA='${{ toJson(github.event.client_payload.data) }}'
          SECRET='${{ github.event.client_payload.secret }}'
          TIMESTAMP='${{ github.event.client_payload.timestamp }}'
          
          # Si DATA está vacío o es null, fallar
          if [ -z "$DATA" ] || [ "$DATA" = "null" ]; then
            echo "❌ No se recibieron datos"
            echo "Payload recibido: ${{ toJson(github.event.client_payload) }}"
            exit 1
          fi
          
          # Verificar secret
          EXPECTED_SECRET="${{ secrets.WEBHOOK_SECRET }}"
          if [ -n "$SECRET" ] && [ "$EXPECTED_SECRET" != "$SECRET" ]; then
            echo "❌ Secret inválido"
            exit 1
          fi
          echo "✅ Secret verificado"
          
          # Guardar datos (eliminar las comillas que agrega toJson)
          echo "$DATA" | sed 's/^"//' | sed 's/"$//' | jq '.' > /tmp/data.json
          
          mkdir -p public/data
          jq '.contabilidades' /tmp/data.json > public/data/contabilidad.json
          jq '.inventario' /tmp/data.json > public/data/inventario.json
          jq '.entradas' /tmp/data.json > public/data/entradas.json
          jq '.donado' /tmp/data.json > public/data/donado.json
          jq '{summary: .summary, timestamp: .timestamp}' /tmp/data.json > public/data/metadata.json
          
          echo "✅ Datos guardados correctamente"
          ls -la public/data/
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/
          git diff --staged --quiet || git commit -m "Actualizar datos desde Apps Script $(date +'%Y-%m-%d %H:%M:%S')"
          git push