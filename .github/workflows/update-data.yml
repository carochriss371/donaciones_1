name: Actualizar Datos desde Apps Script

on:
  # Permitir que sea llamado desde la API
  repository_dispatch:
    types: [update-data]
  
  # Ejecución manual para pruebas
  workflow_dispatch:
    inputs:
      data:
        description: 'Datos JSON'
        required: true
        type: string
      secret:
        description: 'Webhook Secret'
        required: true
        type: string

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permiso para escribir en el repositorio
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Verify secret
        run: |
          EXPECTED_SECRET="${{ secrets.WEBHOOK_SECRET }}"
          # Para repository_dispatch
          RECEIVED_SECRET="${{ github.event.client_payload.secret }}"
          # Para workflow_dispatch
          if [ -z "$RECEIVED_SECRET" ]; then
            RECEIVED_SECRET="${{ github.event.inputs.secret }}"
          fi
          
          if [ "$EXPECTED_SECRET" != "$RECEIVED_SECRET" ]; then
            echo "❌ Secret inválido"
            exit 1
          fi
          echo "✅ Secret verificado"
      
      - name: Extract and save data
        run: |
          # Obtener datos según el tipo de evento
          if [ -n "${{ github.event.client_payload.data }}" ]; then
            DATA='${{ github.event.client_payload.data }}'
          elif [ -n "${{ github.event.inputs.data }}" ]; then
            DATA='${{ github.event.inputs.data }}'
          else
            echo "❌ No se recibieron datos"
            exit 1
          fi
          
          # Crear directorio y guardar datos
          mkdir -p public/data
          echo "$DATA" | jq '.contabilidades' > public/data/contabilidad.json
          echo "$DATA" | jq '.inventario' > public/data/inventario.json
          echo "$DATA" | jq '.donado' > public/data/donado.json
          echo "$DATA" | jq '{summary: .summary, timestamp: .timestamp}' > public/data/metadata.json
          
          echo "✅ Datos guardados correctamente"
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/
          git diff --staged --quiet || git commit -m "Actualizar datos desde Apps Script $(date +'%Y-%m-%d %H:%M:%S')"
          git push